<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="theme-color" content="#4F7970">
  <title>Moj Pritisak</title>
  <script>
    (function () {
      var BUILD = 'APP_VERSION_HERE';
      var KEY = 'moj_pritisak_build';
      if (BUILD === 'APP_VERSION_HERE') return;
      function reloadOnce(version) {
        if (location.search.indexOf('_refresh=') !== -1) return;
        location.replace(location.pathname + '?_refresh=' + encodeURIComponent(version) + (location.hash || ''));
      }
      try {
        var stored = localStorage.getItem(KEY);
        if (stored && stored !== BUILD) {
          localStorage.setItem(KEY, BUILD);
          reloadOnce(BUILD);
          return;
        }
        if (!stored) localStorage.setItem(KEY, BUILD);
        fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var live = data && data.version;
            if (!live || live === 'dev' || live === BUILD) return;
            var prev = localStorage.getItem(KEY);
            localStorage.setItem(KEY, live);
            if (prev && prev !== live) reloadOnce(live);
          })
          .catch(function () {});
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --primary: #4F7970;
      --primary-dark: #3D6159;
      --mobile-header-bg: #3D6159;
      --primary-light: #E8F0EE;
      --accent: #FF6B8B;
      --accent-soft: #FFE8EE;
      --accent-mid: #FF8FA8;
      --accent-dark: #E5527A;
      --text: #111827;
      --text-secondary: #374151;
      --text-muted: #4B5563;
      --border: #E5E7EB;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 16px 40px rgba(15, 23, 42, 0.1);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --danger: #DC2626;
      --nav-height: 72px;
      --sidebar-width: 280px;
      --fab-bottom: calc(var(--nav-height) + 20px);
    }

    html { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      position: relative;
    }

    /* PIN Screen */
    #pin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .pin-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .pin-logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent-soft) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      box-shadow: 0 4px 16px rgba(255, 107, 139, 0.15);
    }

    .pin-logo svg { width: 32px; height: 32px; }

    .pin-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .pin-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-align: left;
    }

    .pin-subtitle {
      display: none;
    }

    #pin-form .btn-primary {
      margin-top: 20px;
    }

    .pin-input {
      font-size: 1.75rem;
      letter-spacing: 0.4em;
      text-align: center;
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      display: block;
      font-weight: 600;
      color: var(--text);
    }

    .pin-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 121, 112, 0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px rgba(79, 121, 112, 0.25);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(79, 121, 112, 0.3);
    }

    .btn-block { width: 100%; }

    .btn-accent {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border: 1.5px solid var(--accent-mid);
    }

    .btn-accent:hover:not(:disabled) {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      margin-top: 12px;
      width: 100%;
    }

    .btn-secondary:hover:not(:disabled) { background: var(--primary-light); }

    .btn-outline {
      background: var(--surface);
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }

    .btn-outline:hover:not(:disabled) { background: var(--primary-light); }

    .btn-danger {
      background: var(--danger);
      color: white;
      border-radius: var(--radius-pill);
    }

    .btn-small {
      padding: 0 18px;
      font-size: 13px;
      height: 40px;
      min-height: 40px;
    }

    /* App shell — desktop sidebar + mobile bottom nav */
    #main-app {
      display: flex;
      min-height: 100vh;
      padding-bottom: var(--nav-height);
    }

    .app-sidebar {
      display: none;
    }

    .app-main {
      flex: 1;
      min-width: 0;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* Header — mobile page headers (dark band, full width) */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: calc(28px + env(safe-area-inset-top, 0px)) 20px 22px;
      position: sticky;
      top: 0;
      background: var(--mobile-header-bg);
      z-index: 10;
      gap: 16px;
      margin-bottom: 20px;
    }

    .header-left {
      min-width: 0;
      flex: 1;
    }

    .header-left h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .header-greeting {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.88);
      margin-top: 8px;
      font-weight: 500;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .header .icon-btn {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
      color: #FFFFFF;
      box-shadow: none;
    }

    .header .icon-btn:hover {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .header-quick-actions {
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .header-quick-actions .btn {
      white-space: nowrap;
      flex-shrink: 0;
      width: auto;
    }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      min-width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent-mid);
    }

    /* Views */
    .view {
      display: none;
      padding: 0 0 120px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .view.active {
      display: block;
      opacity: 1;
    }

    .content-grid {
      display: grid;
      gap: 16px;
    }

    #trendovi-content {
      display: grid;
      gap: 20px;
      padding: 0 20px;
    }

    #danas-content,
    #historija-content {
      padding: 0 20px;
    }

    #danas-critical:not(.hidden) {
      margin-left: 20px;
      margin-right: 20px;
    }

    #trendovi-content .trend-text,
    #trendovi-content .interpretation,
    #trendovi-content .empty-state,
    #trendovi-content .spinner {
      grid-column: 1 / -1;
    }

    .day-content .content-grid {
      margin-top: 8px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 20px;
      border: 1px solid var(--border);
      transition: box-shadow 0.2s;
    }

    .card:hover { box-shadow: var(--shadow-md); }

    .card-measurement {
      padding: 12px 14px;
    }

    .card-measurement .measurement-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .card-measurement .measurement-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-measurement .bp-value {
      font-size: 1.5rem;
      margin: 0;
    }

    .card-measurement .bp-unit {
      font-size: 0.85rem;
    }

    .card-measurement .pulse {
      font-size: 0.8rem;
      padding: 4px 10px;
    }

    .card-measurement .card-note {
      margin-top: 8px;
      padding-top: 8px;
      font-size: 0.8rem;
    }

    .card-measurement .delete-btn {
      padding: 4px 8px;
      font-size: 0.9rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }

    .card-time {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.72rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .bp-value {
      font-variant-numeric: tabular-nums;
      font-size: 2.25rem;
      font-weight: 700;
      margin: 4px 0 8px;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .bp-unit {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .pulse {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--bg);
      padding: 6px 12px;
      border-radius: var(--radius-pill);
    }

    .pulse-icon { color: var(--accent); }

    .card-note {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .delete-btn {
      background: var(--bg);
      border: none;
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.7;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      transition: opacity 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      opacity: 1;
      background: var(--accent-soft);
    }

    .bowel-card { padding: 16px 20px; }

    .bowel-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bowel-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }

    .bowel-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
    }

    .section-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 32px 0 14px;
    }

    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--text-secondary);
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px dashed var(--border);
    }

    .empty-state-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent-soft) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .skeleton {
      background: linear-gradient(90deg, #eef0f2 25%, #f8f9fa 50%, #eef0f2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
      height: 120px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-banner {
      background: var(--accent-soft);
      border: 1px solid #FFC9D6;
      color: #B4234A;
      padding: 14px 18px;
      margin: 0 20px 16px;
      border-radius: var(--radius-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .critical-banner {
      background: linear-gradient(135deg, #7B0D0D, #9B1C1C);
      color: white;
      padding: 14px 18px;
      margin: 0 20px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      text-align: center;
      box-shadow: var(--shadow-md);
    }

    /* FABs — mobile */
    .fab-container {
      position: fixed;
      bottom: var(--fab-bottom);
      right: 20px;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
      z-index: 50;
    }

    .fab {
      border: none;
      border-radius: var(--radius-pill);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .fab:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .fab-primary {
      background: var(--primary);
      color: white;
      padding: 14px 22px;
      font-size: 15px;
    }

    .fab-secondary {
      background: var(--surface);
      color: var(--primary);
      border: 1.5px solid var(--primary);
      padding: 12px 18px;
      font-size: 14px;
    }

    .fab-tertiary {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border: 1.5px solid var(--accent-mid);
      padding: 10px 16px;
      font-size: 13px;
    }

    .fab-tertiary:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Navigation */
    .app-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
    }

    .nav-brand { display: none; }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      padding: 10px 4px;
      transition: color 0.2s;
    }

    .nav-tab.active {
      color: var(--primary);
      font-weight: 600;
    }

    .nav-tab.active .nav-icon {
      position: relative;
    }

    .nav-tab.active .nav-icon::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-tab.active .nav-icon svg { stroke-width: 2.25; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 520px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 20px calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: var(--shadow-lg);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin: 4px auto 16px;
      flex-shrink: 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      padding-top: 4px;
    }

    .modal-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
      color: var(--text);
      letter-spacing: -0.02em;
      flex: 1;
      min-width: 0;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.2s, color 0.2s;
      padding: 0;
    }

    .modal-close:hover {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-color: var(--accent-mid);
    }

    .modal-close svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 121, 112, 0.12);
      background: var(--surface);
    }

    .field-error {
      color: var(--accent);
      font-size: 0.8rem;
      margin-top: 6px;
      font-weight: 500;
    }

    .bowel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .bowel-type-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 4px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.6rem;
      font-weight: 500;
      text-align: center;
      font-family: inherit;
      color: var(--text);
      line-height: 1.2;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .bowel-type-btn:hover { border-color: var(--primary); }

    .bowel-type-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(79, 121, 112, 0.12);
    }

    .bowel-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow-sm);
    }

    .bowel-type-num {
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--primary);
    }

    .bowel-type-btn span:last-child {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Probiotics */
    .probiotic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .probiotic-type-btn {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .probiotic-type-btn:hover { border-color: var(--primary); }

    .probiotic-type-btn.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 600;
      box-shadow: 0 0 0 3px rgba(255, 107, 139, 0.15);
    }

    .probiotic-card { padding: 16px 20px; }

    .probiotic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .probiotic-chip {
      display: inline-block;
      padding: 5px 12px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(255, 107, 139, 0.2);
    }

    .probiotic-icon {
      color: var(--accent);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .section-title-accent {
      color: var(--accent-dark);
    }

    /* Historia */
    .day-group { margin-bottom: 10px; }

    .day-header {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .day-header:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(79, 121, 112, 0.25);
    }

    .day-header-left h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .day-header-stats {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.45;
    }

    .day-header-avg {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
    }

    .day-chevron {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.25s;
    }

    .day-group.expanded .day-chevron { transform: rotate(180deg); }

    .day-content {
      display: none;
      padding: 12px 0 4px;
    }

    .day-group.expanded .day-content { display: block; }

    .load-more-btn { width: 100%; margin: 20px 0; }

    .export-btn {
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      background: var(--surface);
      color: var(--primary-dark);
      border: 1.5px solid var(--primary);
      font-weight: 600;
    }

    /* Trendovi */
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 0;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .stat-card h3 {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 700;
      margin-bottom: 22px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-values {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-item { text-align: center; min-width: 72px; }

    .stat-num {
      font-variant-numeric: tabular-nums;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 600;
      margin-top: 4px;
    }

    .trend-text {
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      text-align: center;
    }

    .interpretation {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .bar-chart { margin: 16px 0; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .bar-label {
      width: 148px;
      flex-shrink: 0;
      text-align: right;
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.25;
    }

    .bar-track {
      flex: 1;
      height: 22px;
      background: var(--bg);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: var(--radius-pill);
      transition: width 0.6s cubic-bezier(0.32, 0.72, 0, 1);
      min-width: 4px;
    }

    .bar-count {
      width: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .period-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .period-table th,
    .period-table td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .period-table th:first-child,
    .period-table td:first-child {
      text-align: left;
      color: var(--text);
      font-weight: 600;
    }

    .period-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      font-weight: 700;
    }

    .period-table tbody tr:last-child td { border-bottom: none; }

    .period-table .num {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 1.1rem;
    }

    .period-table .sub {
      display: block;
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 3px;
    }

    .chart-wrap {
      position: relative;
      height: 260px;
      margin-top: 8px;
    }

    .chart-wrap.tall { height: 300px; }

    .chart-note {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-top: 16px;
    }

    .probiotic-day-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .probiotic-day-tag {
      font-size: 0.72rem;
      padding: 4px 8px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 600;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 32px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    .dev-banner {
      background: #FEF9C3;
      color: #854D0E;
      border-bottom: 1px solid #FDE047;
      padding: 10px 20px;
      font-size: 0.8rem;
      text-align: center;
      font-weight: 500;
    }

    /* ── Desktop layout ── */
    @media (min-width: 900px) {
      #main-app {
        padding-bottom: 0;
      }

      .nav-tab.active .nav-icon::after { display: none; }

      .app-sidebar {
        display: block;
        position: fixed;
        left: 0;
        top: 0;
        width: var(--sidebar-width);
        padding: 28px 16px 0;
        z-index: 30;
        background: transparent;
        border: none;
        box-shadow: none;
      }

      .app-nav {
        position: fixed;
        left: 0;
        top: 108px;
        width: var(--sidebar-width);
        flex-direction: column;
        height: auto;
        border: none;
        box-shadow: none;
        padding: 0 16px;
        gap: 4px;
        background: transparent;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px 28px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 20px;
      }

      .sidebar-brand-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent-soft) 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        box-shadow: 0 2px 8px rgba(255, 107, 139, 0.12);
      }

      .sidebar-brand-icon svg { width: 24px; height: 24px; }

      .sidebar-brand-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      #main-app::before {
        content: '';
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: var(--sidebar-width);
        background: var(--surface);
        border-right: 1px solid var(--border);
        z-index: 20;
        box-shadow: var(--shadow-sm);
      }

      .app-nav {
        z-index: 31;
      }

      .app-sidebar {
        z-index: 31;
      }

      .nav-tab {
        flex: none;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        width: 100%;
      }

      .nav-tab:hover { background: var(--bg); }

      .nav-tab.active {
        background: var(--primary-light);
        color: var(--primary-dark);
        box-shadow: inset 3px 0 0 var(--accent);
      }

      .app-main {
        margin-left: var(--sidebar-width);
        max-width: none;
        padding: 0 32px 48px;
      }

      .view { padding: 0 0 48px; }

      .header {
        padding: 32px 0 24px;
        position: static;
        background: transparent;
        align-items: center;
        margin-bottom: 0;
      }

      .header-left h1 {
        font-size: 1.75rem;
        color: var(--text);
      }

      .header-greeting {
        color: var(--text-secondary);
        margin-top: 6px;
        font-size: 0.9rem;
      }

      .header .icon-btn {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
        box-shadow: var(--shadow-sm);
      }

      .header .icon-btn:hover {
        background: var(--accent-soft);
        border-color: var(--accent-mid);
      }

      #danas-content,
      #historija-content,
      #trendovi-content {
        padding-left: 0;
        padding-right: 0;
      }

      #danas-critical:not(.hidden) {
        margin-left: 0;
        margin-right: 0;
      }

      #trendovi-content {
        margin-top: 16px;
      }

      .header-quick-actions {
        display: flex;
        align-items: center;
      }

      .fab-container { display: none; }

      .error-banner,
      .critical-banner { margin: 0 0 20px; }

      .export-btn {
        width: auto;
        margin: 0 0 24px;
      }

      .content-grid {
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      }

      .bowel-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }

      .bowel-type-btn { padding: 10px 6px; font-size: 0.68rem; }
      .bowel-swatch { width: 26px; height: 26px; }

      .modal-overlay {
        align-items: center;
        padding: 24px;
      }

      .modal {
        border-radius: var(--radius-lg);
        padding: 28px;
        transform: translateY(24px) scale(0.97);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.35s;
      }

      .modal-handle { display: none; }

      .modal-header h2 { font-size: 1.35rem; }

      .modal-overlay.open .modal {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      #trendovi-content {
        grid-template-columns: repeat(2, 1fr);
      }

      .bar-label { width: 140px; }
    }

    @media (min-width: 1200px) {
      .app-main {
        padding: 0 48px 48px;
      }

      .content-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="dev-banner" class="dev-banner hidden"></div>
  <div id="app">
    <!-- PIN Screen -->
    <div id="pin-screen">
      <div class="pin-card">
        <div class="pin-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="pin-title">Moj Pritisak</div>
        <form id="pin-form">
          <label class="pin-label" for="pin-input">Unesi PIN</label>
          <input type="tel" class="pin-input" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="••••">
          <div class="field-error hidden" id="err-pin"></div>
          <button type="submit" class="btn btn-primary btn-block" id="pin-submit">Ulazi</button>
        </form>
      </div>
    </div>

    <!-- Main App (hidden until PIN set) -->
    <div id="main-app" class="hidden">
      <aside class="app-sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <span class="sidebar-brand-name">Moj Pritisak</span>
        </div>
      </aside>

      <nav class="app-nav">
        <button class="nav-tab active" data-view="danas">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></span>
          <span>Danas</span>
        </button>
        <button class="nav-tab" data-view="historija">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
          <span>Historija</span>
        </button>
        <button class="nav-tab" data-view="trendovi">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 7l-8.5 8.5-4-4L2 17"/><path d="M16 7h6v6"/></svg></span>
          <span>Trendovi</span>
        </button>
      </nav>

      <div class="app-main">
      <div id="error-banner" class="error-banner hidden">
        <span id="error-banner-text">Greška pri učitavanju. Provjeri internet vezu.</span>
        <button class="btn btn-small btn-danger" id="retry-btn">Pokušaj ponovo</button>
      </div>

      <!-- Danas -->
      <div id="view-danas" class="view active">
        <div class="header">
          <div class="header-left">
            <h1>Moj Pritisak</h1>
            <div class="header-greeting" id="danas-date"></div>
          </div>
          <div class="header-actions">
            <div class="header-quick-actions">
              <button class="btn btn-outline btn-small" id="desk-fab-bowel">+ Stolica</button>
              <button class="btn btn-accent btn-small" id="desk-fab-probiotic">+ Probiotik</button>
              <button class="btn btn-primary btn-small" id="desk-fab-measurement">+ Pritisak</button>
            </div>
            <button class="icon-btn" id="settings-btn" title="Postavke" aria-label="Postavke">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
          </div>
        </div>
        <div id="danas-critical" class="critical-banner hidden"></div>
        <div id="danas-content" class="content-grid"></div>
      </div>

      <!-- Historija -->
      <div id="view-historija" class="view">
        <div class="header">
          <div class="header-left">
            <h1>Historija</h1>
            <div class="header-greeting">Pregled svih unosa</div>
          </div>
        </div>
        <button class="btn export-btn" id="export-btn">Exportuj tabelu</button>
        <div id="historija-content"></div>
      </div>

      <!-- Trendovi -->
      <div id="view-trendovi" class="view">
        <div class="header">
          <div class="header-left">
            <h1>Trendovi</h1>
            <div class="header-greeting">Statistike i analiza</div>
          </div>
        </div>
        <div id="trendovi-content"></div>
      </div>

      <!-- FABs (mobile) -->
      <div class="fab-container" id="fab-container">
        <button class="fab fab-primary" id="fab-measurement">+ Pritisak</button>
        <button class="fab fab-secondary" id="fab-bowel">+ Stolica</button>
        <button class="fab fab-tertiary" id="fab-probiotic">+ Probiotik</button>
      </div>
      </div><!-- .app-main -->
    </div>
  </div>

  <!-- Add Measurement Modal -->
  <div class="modal-overlay" id="modal-measurement">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Novo mjerenje</h2>
        <button type="button" class="modal-close" aria-label="Zatvori"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <form id="form-measurement">
        <div class="form-group">
          <label for="m-systolic">Gornji pritisak</label>
          <input type="number" id="m-systolic" placeholder="120" min="60" max="250" inputmode="numeric">
          <div class="field-error hidden" id="err-systolic"></div>
        </div>
        <div class="form-group">
          <label for="m-diastolic">Donji pritisak</label>
          <input type="number" id="m-diastolic" placeholder="80" min="40" max="150" inputmode="numeric">
          <div class="field-error hidden" id="err-diastolic"></div>
        </div>
        <div class="form-group">
          <label for="m-pulse">Otkucaji srca</label>
          <input type="number" id="m-pulse" placeholder="72" min="30" max="200" inputmode="numeric">
          <div class="field-error hidden" id="err-pulse"></div>
        </div>
        <div class="form-group">
          <label for="m-note">Bilješka</label>
          <input type="text" id="m-note" placeholder="npr. nakon kafe...">
        </div>
        <div class="form-group">
          <label for="m-datetime">Datum i vrijeme</label>
          <input type="datetime-local" id="m-datetime">
          <div class="field-error hidden" id="err-datetime"></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sačuvaj mjerenje</button>
      </form>
    </div>
  </div>

  <!-- Add Bowel Modal -->
  <div class="modal-overlay" id="modal-bowel">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Nova stolica</h2>
        <button type="button" class="modal-close" aria-label="Zatvori"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <form id="form-bowel">
        <div class="form-group">
          <label>Tip stolice</label>
          <div class="bowel-grid" id="bowel-grid"></div>
          <div class="field-error hidden" id="err-bowel-type"></div>
        </div>
        <div class="form-group">
          <label for="b-note">Bilješka</label>
          <input type="text" id="b-note" placeholder="Opcionalno...">
        </div>
        <div class="form-group">
          <label for="b-datetime">Datum i vrijeme</label>
          <input type="datetime-local" id="b-datetime">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sačuvaj</button>
      </form>
    </div>
  </div>

  <!-- Add Probiotic Modal -->
  <div class="modal-overlay" id="modal-probiotic">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Novi probiotik</h2>
        <button type="button" class="modal-close" aria-label="Zatvori"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <form id="form-probiotic">
        <div class="form-group">
          <label>Vrsta probiotika (možete odabrati više)</label>
          <div class="probiotic-grid" id="probiotic-grid"></div>
          <div class="field-error hidden" id="err-probiotic-types"></div>
        </div>
        <div class="form-group">
          <label for="p-note">Bilješka</label>
          <input type="text" id="p-note" placeholder="Opcionalno...">
        </div>
        <div class="form-group">
          <label for="p-datetime">Datum i vrijeme</label>
          <input type="datetime-local" id="p-datetime">
          <div class="field-error hidden" id="err-probiotic-datetime"></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sačuvaj</button>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="modal-settings">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Postavke</h2>
        <button type="button" class="modal-close" aria-label="Zatvori"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:20px;">Odjava uklanja pristup s ovog uređaja. PIN ostaje isti za sve korisnike.</p>
      <button type="button" class="btn btn-outline btn-block" id="logout-btn">Odjava</button>
      <button type="button" class="btn btn-secondary" id="close-settings" style="width:100%;margin-top:8px;">Zatvori</button>
    </div>
  </div>

  <script>
    (async function () {
    const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    if (IS_LOCAL) {
      await new Promise(resolve => {
        const s = document.createElement('script');
        s.src = 'config.local.js';
        s.onload = resolve;
        s.onerror = resolve;
        document.head.appendChild(s);
      });
    }

    const cfg = window.__SUPABASE_CONFIG__;
    const SUPABASE_URL = cfg?.url ?? 'SUPABASE_URL_HERE';
    const SUPABASE_ANON_KEY = cfg?.key ?? 'SUPABASE_ANON_KEY_HERE';
    const FORCE_MOCK = new URLSearchParams(location.search).get('mock') === '1';
    const HAS_REAL_CONFIG = SUPABASE_URL !== 'SUPABASE_URL_HERE' && SUPABASE_ANON_KEY !== 'SUPABASE_ANON_KEY_HERE';
    const USE_MOCK = FORCE_MOCK || (IS_LOCAL && !HAS_REAL_CONFIG);

    const MOCK_KEYS = {
      measurements: 'moj_pritisak_mock_measurements',
      bowel_movements: 'moj_pritisak_mock_bowel_movements',
      probiotic_entries: 'moj_pritisak_mock_probiotic_entries'
    };

    let db = null;

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function showDevBanner(msg) {
      const el = document.getElementById('dev-banner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function mockGetTable(table) {
      return JSON.parse(localStorage.getItem(MOCK_KEYS[table]) || '[]');
    }

    function mockSaveTable(table, rows) {
      localStorage.setItem(MOCK_KEYS[table], JSON.stringify(rows));
    }

    function mockFilterRows(rows, dateField, fromDate, toDate) {
      return rows
        .filter(r => r.pin_hash === currentPinHash)
        .filter(r => {
          const t = new Date(r[dateField]);
          if (fromDate && t < fromDate) return false;
          if (toDate && t > toDate) return false;
          return true;
        })
        .sort((a, b) => new Date(a[dateField]) - new Date(b[dateField]));
    }

    if (USE_MOCK) {
      showDevBanner('🧪 Lokalni mock — podaci se čuvaju u localStorage (bez Supabase)');
    } else {
      await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const PIN_KEY = 'moj_pritisak_pin_hash';
    const APP_PIN = '1405';
    const DAYS = ['Nedjelja', 'Ponedjeljak', 'Utorak', 'Srijeda', 'Četvrtak', 'Petak', 'Subota'];
    const MONTHS = ['januar', 'februar', 'mart', 'april', 'maj', 'juni', 'juli', 'august', 'septembar', 'oktobar', 'novembar', 'decembar'];

    const BOWEL_TYPES = [
      { num: 1, label: 'Tvrde grudice', color: '#3D2314' },
      { num: 2, label: 'Grumuljasto', color: '#5C3A1E' },
      { num: 3, label: 'Pukotine, tvrdo', color: '#7A4F28' },
      { num: 4, label: 'Normalno ✓', color: '#9B6B3A' },
      { num: 5, label: 'Mekše, jasni rubovi', color: '#B8894F' },
      { num: 6, label: 'Kašasto', color: '#D4A96A' },
      { num: 7, label: 'Vodenasto (proljev)', color: '#E8C98A' }
    ];

    const PROBIOTIC_TYPES = [
      { key: 'bulardi', label: 'Bulardi' },
      { key: 'omnibiotic_stress', label: 'Omnibiotic Stress' },
      { key: 'omnibiotic_10', label: 'Omnibiotic 10' },
      { key: 'colosal', label: 'Colosal' },
      { key: 'enterosgel', label: 'Enterosgel' },
      { key: 'linex', label: 'Linex' },
      { key: 'enterofuril', label: 'Enterofuril' },
      { key: 'colobalance', label: 'Colobalance' }
    ];

    const BP_CATEGORIES = [
      { key: 'low', label: '<80 / <50', color: '#5B8DB8' },
      { key: 'normal', label: '80–109 / 50–74', color: '#3A8A5C' },
      { key: 'high-normal', label: '110–124 / 75–79', color: '#D4821A' },
      { key: 'elevated', label: '125–144 / 80–89', color: '#E07B39' },
      { key: 'high', label: '145–164 / 90–99', color: '#C0392B' },
      { key: 'critical', label: '≥165 / ≥100', color: '#7B0D0D' }
    ];

    let currentPinHash = null;
    let currentView = 'danas';
    let historijaDaysLoaded = 30;
    let selectedBowelType = null;
    let selectedProbioticTypes = new Set();

    async function hashPin(pin) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function formatDateLong(date) {
      const d = new Date(date);
      return `${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}.`;
    }

    function formatTime(date) {
      return new Date(date).toLocaleTimeString('bs-BA', { hour: '2-digit', minute: '2-digit' });
    }

    function toLocalDatetimeValue(date) {
      const d = new Date(date);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function localDateKey(date) {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function classifyBP(sys, dia) {
      if (sys >= 165 || dia >= 100) return { label: '≥165 / ≥100', color: '#7B0D0D', key: 'critical', critical: true };
      if (sys >= 145 || dia >= 90) return { label: '145–164 / 90–99', color: '#C0392B', key: 'high' };
      if (sys >= 125 || dia >= 80) return { label: '125–144 / 80–89', color: '#E07B39', key: 'elevated' };
      if (sys >= 110 || dia >= 75) return { label: '110–124 / 75–79', color: '#D4821A', key: 'high-normal' };
      if (sys >= 80 && dia >= 50) return { label: '80–109 / 50–74', color: '#3A8A5C', key: 'normal' };
      return { label: '<80 / <50', color: '#5B8DB8', key: 'low' };
    }

    function getBowelType(num) {
      return BOWEL_TYPES.find(t => t.num === num) || BOWEL_TYPES[3];
    }

    function getProbioticLabel(key) {
      return PROBIOTIC_TYPES.find(p => p.key === key)?.label || key;
    }

    function getTableForRecordType(type) {
      if (type === 'measurement') return 'measurements';
      if (type === 'bowel') return 'bowel_movements';
      if (type === 'probiotic') return 'probiotic_entries';
      return null;
    }

    function isMissingTableError(error, tableName) {
      if (!error) return false;
      const blob = `${error.code || ''} ${error.message || ''} ${error.details || ''} ${error.hint || ''}`.toLowerCase();
      return blob.includes(tableName) ||
        blob.includes('schema cache') ||
        blob.includes('does not exist') ||
        error.code === 'PGRST205' ||
        error.code === '42P01';
    }

    function formatFetchError(error) {
      if (!HAS_REAL_CONFIG) {
        return 'Supabase nije konfigurisan. Provjerite GitHub Secrets (SUPABASE_URL, SUPABASE_ANON_KEY).';
      }
      if (isMissingTableError(error, 'probiotic_entries')) {
        return 'Tabela probiotic_entries ne postoji. Pokrenite supabase_migration_probiotics.sql u Supabase SQL Editoru.';
      }
      if (isMissingTableError(error, 'measurements') || isMissingTableError(error, 'bowel_movements')) {
        return 'Baza nije postavljena. Pokrenite supabase_setup.sql u Supabase SQL Editoru.';
      }
      if (error?.message) return error.message;
      return 'Greška pri učitavanju. Provjeri internet vezu.';
    }

    function showError(show, message) {
      document.getElementById('error-banner').classList.toggle('hidden', !show);
      if (message) {
        document.getElementById('error-banner-text').textContent = message;
      }
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      if (msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    function clearMeasurementErrors() {
      ['err-systolic', 'err-diastolic', 'err-pulse', 'err-datetime'].forEach(id => showFieldError(id, null));
    }

    // PIN — fiksni PIN 1405
    const appPinHash = await hashPin(APP_PIN);

    function initPinScreen() {
      const stored = localStorage.getItem(PIN_KEY);
      if (stored === appPinHash) {
        currentPinHash = appPinHash;
        showMainApp();
        return;
      }
      if (stored) localStorage.removeItem(PIN_KEY);
      document.getElementById('pin-screen').classList.remove('hidden');
      document.getElementById('main-app').classList.add('hidden');
    }

    document.getElementById('pin-input').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
      showFieldError('err-pin', null);
    });

    async function submitPin(e) {
      if (e) e.preventDefault();
      const pin = document.getElementById('pin-input').value;
      if (pin.length !== 4) {
        showFieldError('err-pin', 'PIN mora imati 4 cifre.');
        return;
      }
      if (pin !== APP_PIN) {
        showFieldError('err-pin', 'PIN nije ispravan.');
        return;
      }
      localStorage.setItem(PIN_KEY, appPinHash);
      currentPinHash = appPinHash;
      showMainApp();
    }

    document.getElementById('pin-form').addEventListener('submit', submitPin);
    document.getElementById('pin-submit').addEventListener('click', submitPin);

    function showMainApp() {
      document.getElementById('pin-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      document.getElementById('danas-date').textContent = formatDateLong(new Date());
      loadCurrentView();
    }

    // Navigation
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const view = tab.dataset.view;
        switchView(view);
      });
    });

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const viewEl = document.getElementById(`view-${view}`);
      viewEl.classList.add('active');
      requestAnimationFrame(() => viewEl.style.opacity = '1');
      document.getElementById('fab-container').classList.toggle('hidden', view !== 'danas');
      loadCurrentView();
    }

    function loadCurrentView() {
      if (!currentPinHash) return;
      if (currentView === 'danas') loadDanas();
      else if (currentView === 'historija') loadHistorija();
      else if (currentView === 'trendovi') loadTrendovi();
    }

    document.getElementById('retry-btn').addEventListener('click', loadCurrentView);

    // Data fetching
    async function fetchMeasurements(fromDate, toDate) {
      if (USE_MOCK) {
        return mockFilterRows(mockGetTable('measurements'), 'measured_at', fromDate, toDate);
      }
      let query = db
        .from('measurements')
        .select('*')
        .eq('pin_hash', currentPinHash)
        .order('measured_at', { ascending: true });
      if (fromDate) query = query.gte('measured_at', fromDate.toISOString());
      if (toDate) query = query.lte('measured_at', toDate.toISOString());
      const { data, error } = await query;
      if (error) throw error;
      return data || [];
    }

    async function fetchBowel(fromDate, toDate) {
      if (USE_MOCK) {
        return mockFilterRows(mockGetTable('bowel_movements'), 'recorded_at', fromDate, toDate);
      }
      let query = db
        .from('bowel_movements')
        .select('*')
        .eq('pin_hash', currentPinHash)
        .order('recorded_at', { ascending: true });
      if (fromDate) query = query.gte('recorded_at', fromDate.toISOString());
      if (toDate) query = query.lte('recorded_at', toDate.toISOString());
      const { data, error } = await query;
      if (error) throw error;
      return data || [];
    }

    async function fetchProbiotics(fromDate, toDate) {
      if (USE_MOCK) {
        return mockFilterRows(mockGetTable('probiotic_entries'), 'taken_at', fromDate, toDate);
      }
      let query = db
        .from('probiotic_entries')
        .select('*')
        .eq('pin_hash', currentPinHash)
        .order('taken_at', { ascending: true });
      if (fromDate) query = query.gte('taken_at', fromDate.toISOString());
      if (toDate) query = query.lte('taken_at', toDate.toISOString());
      const { data, error } = await query;
      if (error) {
        if (isMissingTableError(error, 'probiotic_entries')) {
          console.warn('probiotic_entries tabela ne postoji — preskačem');
          return [];
        }
        throw error;
      }
      return data || [];
    }

    async function fetchAllData() {
      if (USE_MOCK) {
        const measurements = mockGetTable('measurements').filter(r => r.pin_hash === currentPinHash);
        const bowel = mockGetTable('bowel_movements').filter(r => r.pin_hash === currentPinHash);
        const probiotics = mockGetTable('probiotic_entries').filter(r => r.pin_hash === currentPinHash);
        return { measurements, bowel, probiotics };
      }
      const [measurements, bowel, probiotics] = await Promise.all([
        db.from('measurements').select('*').eq('pin_hash', currentPinHash).order('measured_at', { ascending: true }),
        db.from('bowel_movements').select('*').eq('pin_hash', currentPinHash).order('recorded_at', { ascending: true }),
        db.from('probiotic_entries').select('*').eq('pin_hash', currentPinHash).order('taken_at', { ascending: true })
      ]);
      if (measurements.error) throw measurements.error;
      if (bowel.error) throw bowel.error;
      if (probiotics.error && !isMissingTableError(probiotics.error, 'probiotic_entries')) {
        throw probiotics.error;
      }
      return {
        measurements: measurements.data || [],
        bowel: bowel.data || [],
        probiotics: probiotics.error ? [] : (probiotics.data || [])
      };
    }

    async function deleteRecord(table, id) {
      if (USE_MOCK) {
        mockSaveTable(table, mockGetTable(table).filter(r => !(r.id === id && r.pin_hash === currentPinHash)));
        return { error: null };
      }
      return db.from(table).delete().eq('id', id).eq('pin_hash', currentPinHash);
    }

    async function insertMeasurement(row) {
      if (USE_MOCK) {
        const rows = mockGetTable('measurements');
        rows.push({ ...row, id: crypto.randomUUID(), created_at: new Date().toISOString() });
        mockSaveTable('measurements', rows);
        return { error: null };
      }
      return db.from('measurements').insert(row);
    }

    async function insertBowel(row) {
      if (USE_MOCK) {
        const rows = mockGetTable('bowel_movements');
        rows.push({ ...row, id: crypto.randomUUID(), created_at: new Date().toISOString() });
        mockSaveTable('bowel_movements', rows);
        return { error: null };
      }
      return db.from('bowel_movements').insert(row);
    }

    async function insertProbiotic(row) {
      if (USE_MOCK) {
        const rows = mockGetTable('probiotic_entries');
        rows.push({ ...row, id: crypto.randomUUID(), created_at: new Date().toISOString() });
        mockSaveTable('probiotic_entries', rows);
        return { error: null };
      }
      return db.from('probiotic_entries').insert(row);
    }

    // Danas view
    async function loadDanas() {
      const container = document.getElementById('danas-content');
      const criticalEl = document.getElementById('danas-critical');
      container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
      criticalEl.classList.add('hidden');
      showError(false);

      try {
        const todayStart = getTodayStart();
        const tomorrow = new Date(todayStart);
        tomorrow.setDate(tomorrow.getDate() + 1);

        const [measurements, bowel, probiotics] = await Promise.all([
          fetchMeasurements(todayStart, tomorrow),
          fetchBowel(todayStart, tomorrow),
          fetchProbiotics(todayStart, tomorrow)
        ]);

        let html = '';
        let hasCritical = false;

        if (measurements.length === 0 && bowel.length === 0 && probiotics.length === 0) {
          html = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>Nema mjerenja za danas.<br>Dodaj prvo mjerenje.</div>`;
        } else {
          measurements.forEach(m => {
            const cls = classifyBP(m.systolic, m.diastolic);
            if (cls.critical) hasCritical = true;
            html += renderMeasurementCard(m);
          });

          if (bowel.length > 0) {
            html += '<div class="section-title" style="grid-column:1/-1">Stolica</div>';
            bowel.forEach(b => { html += renderBowelCard(b); });
          }

          if (probiotics.length > 0) {
            html += '<div class="section-title section-title-accent" style="grid-column:1/-1">Probiotik</div>';
            probiotics.forEach(p => { html += renderProbioticCard(p); });
          }
        }

        if (hasCritical) {
          criticalEl.textContent = '⚠️ KRITIČNO — Obratite se liječniku odmah!';
          criticalEl.classList.remove('hidden');
        }

        container.innerHTML = html;
        bindDeleteHandlers();
      } catch (e) {
        console.error(e);
        container.innerHTML = '';
        showError(true, formatFetchError(e));
      }
    }

    function renderMeasurementCard(m) {
      return `
        <div class="card card-measurement" data-id="${m.id}" data-type="measurement">
          <div class="measurement-top">
            <span class="card-time">${formatTime(m.measured_at)}</span>
            <button class="delete-btn" data-id="${m.id}" data-type="measurement" title="Obriši">🗑</button>
          </div>
          <div class="measurement-main">
            <span class="bp-value">${m.systolic}/${m.diastolic} <span class="bp-unit">mmHg</span></span>
            <span class="pulse"><span class="pulse-icon">♥</span> ${m.pulse}</span>
          </div>
          ${m.note ? `<div class="card-note">${escapeHtml(m.note)}</div>` : ''}
        </div>`;
    }

    function renderBowelCard(b) {
      const type = getBowelType(b.type);
      return `
        <div class="card bowel-card" data-id="${b.id}" data-type="bowel">
          <div class="bowel-row">
            <span class="card-time">${formatTime(b.recorded_at)}</span>
            <span class="bowel-dot" style="background:${type.color}"></span>
            <span class="bowel-label">Tip ${b.type}: ${type.label}</span>
            <button class="delete-btn" data-id="${b.id}" data-type="bowel" title="Obriši" style="margin-left:auto">🗑</button>
          </div>
          ${b.note ? `<div class="card-note">${escapeHtml(b.note)}</div>` : ''}
        </div>`;
    }

    function renderProbioticCard(p) {
      const types = Array.isArray(p.types) ? p.types : [];
      const chips = types.map(t => `<span class="probiotic-chip">${escapeHtml(getProbioticLabel(t))}</span>`).join('');
      return `
        <div class="card probiotic-card" data-id="${p.id}" data-type="probiotic">
          <div class="bowel-row">
            <span class="card-time">${formatTime(p.taken_at)}</span>
            <span class="probiotic-icon">💊</span>
            <span class="bowel-label">Probiotik</span>
            <button class="delete-btn" data-id="${p.id}" data-type="probiotic" title="Obriši" style="margin-left:auto">🗑</button>
          </div>
          <div class="probiotic-chips">${chips}</div>
          ${p.note ? `<div class="card-note">${escapeHtml(p.note)}</div>` : ''}
        </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function bindDeleteHandlers() {
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('Jeste li sigurni da želite obrisati ovaj unos?')) return;
          const id = btn.dataset.id;
          const type = btn.dataset.type;
          const table = getTableForRecordType(type);
          if (!table) return;
          const { error } = await deleteRecord(table, id);
          if (error) { alert('Greška pri brisanju.'); return; }
          loadCurrentView();
        });
      });
    }

    // Historija view
    async function loadHistorija() {
      const container = document.getElementById('historija-content');
      container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
      showError(false);

      try {
        const endDate = new Date();
        endDate.setHours(23, 59, 59, 999);
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - historijaDaysLoaded);
        startDate.setHours(0, 0, 0, 0);

        const [measurements, bowel, probiotics] = await Promise.all([
          fetchMeasurements(startDate, endDate),
          fetchBowel(startDate, endDate),
          fetchProbiotics(startDate, endDate)
        ]);

        const dayMap = {};

        measurements.forEach(m => {
          const key = localDateKey(m.measured_at);
          if (!dayMap[key]) dayMap[key] = { date: new Date(m.measured_at), measurements: [], bowel: [], probiotics: [] };
          dayMap[key].measurements.push(m);
        });

        bowel.forEach(b => {
          const key = localDateKey(b.recorded_at);
          if (!dayMap[key]) dayMap[key] = { date: new Date(b.recorded_at), measurements: [], bowel: [], probiotics: [] };
          dayMap[key].bowel.push(b);
        });

        probiotics.forEach(p => {
          const key = localDateKey(p.taken_at);
          if (!dayMap[key]) dayMap[key] = { date: new Date(p.taken_at), measurements: [], bowel: [], probiotics: [] };
          dayMap[key].probiotics.push(p);
        });

        const sortedDays = Object.keys(dayMap).sort((a, b) => b.localeCompare(a));

        if (sortedDays.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>Nema podataka za prikaz.</div>';
          return;
        }

        let html = '';
        sortedDays.forEach(key => {
          const day = dayMap[key];
          const avgSys = day.measurements.length
            ? Math.round(day.measurements.reduce((s, m) => s + m.systolic, 0) / day.measurements.length)
            : '—';
          const avgDia = day.measurements.length
            ? Math.round(day.measurements.reduce((s, m) => s + m.diastolic, 0) / day.measurements.length)
            : '—';

          html += `
            <div class="day-group" data-day="${key}">
              <div class="day-header">
                <div class="day-header-left">
                  <h3>${formatDateLong(day.date)}</h3>
                  <div class="day-header-stats">${day.measurements.length} mjerenja · ${day.bowel.length} stolica · ${day.probiotics.length} probiotik</div>
                </div>
                <div style="text-align:right">
                  <div class="day-header-avg">${avgSys}/${avgDia}</div>
                  <span class="day-chevron">▼</span>
                </div>
              </div>
              <div class="day-content"><div class="content-grid">`;

          day.measurements.forEach(m => { html += renderMeasurementCard(m); });
          day.bowel.forEach(b => { html += renderBowelCard(b); });
          day.probiotics.forEach(p => { html += renderProbioticCard(p); });

          html += '</div></div></div>';
        });

        html += '<button class="btn btn-primary load-more-btn" id="load-more-btn">Učitaj starije</button>';
        container.innerHTML = html;

        document.querySelectorAll('.day-header').forEach(header => {
          header.addEventListener('click', () => {
            header.parentElement.classList.toggle('expanded');
          });
        });

        document.getElementById('load-more-btn').addEventListener('click', () => {
          historijaDaysLoaded += 30;
          loadHistorija();
        });

        bindDeleteHandlers();
      } catch (e) {
        console.error(e);
        container.innerHTML = '';
        showError(true, formatFetchError(e));
      }
    }

    function csvEscape(val) {
      const s = val == null ? '' : String(val);
      if (/[",\n\r]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
      return s;
    }

    function buildExportCsv(data) {
      const headers = ['tip', 'datum_vrijeme', 'gornji_pritisak', 'donji_pritisak', 'puls', 'tip_stolice', 'probiotici', 'biljeska'];
      const rows = [];

      data.measurements.forEach(m => {
        rows.push({
          tip: 'mjerenje',
          datum_vrijeme: m.measured_at,
          gornji_pritisak: m.systolic,
          donji_pritisak: m.diastolic,
          puls: m.pulse,
          tip_stolice: '',
          probiotici: '',
          biljeska: m.note || ''
        });
      });

      data.bowel.forEach(b => {
        rows.push({
          tip: 'stolica',
          datum_vrijeme: b.recorded_at,
          gornji_pritisak: '',
          donji_pritisak: '',
          puls: '',
          tip_stolice: b.type,
          probiotici: '',
          biljeska: b.note || ''
        });
      });

      (data.probiotics || []).forEach(p => {
        const types = Array.isArray(p.types) ? p.types : [];
        rows.push({
          tip: 'probiotik',
          datum_vrijeme: p.taken_at,
          gornji_pritisak: '',
          donji_pritisak: '',
          puls: '',
          tip_stolice: '',
          probiotici: types.map(getProbioticLabel).join('; '),
          biljeska: p.note || ''
        });
      });

      rows.sort((a, b) => new Date(a.datum_vrijeme) - new Date(b.datum_vrijeme));

      const lines = [headers.join(',')];
      rows.forEach(row => {
        lines.push(headers.map(h => csvEscape(row[h])).join(','));
      });
      return lines.join('\n');
    }

    // Export
    document.getElementById('export-btn').addEventListener('click', async () => {
      try {
        const data = await fetchAllData();
        const blob = new Blob(['\uFEFF' + buildExportCsv(data)], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `moj-pritisak-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Greška pri izvozu podataka.');
      }
    });

    // Trendovi view
    let trendCharts = [];

    function destroyTrendCharts() {
      trendCharts.forEach(c => c.destroy());
      trendCharts = [];
    }

    function getPeriodRanges() {
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart);
      yesterdayStart.setDate(yesterdayStart.getDate() - 1);
      const weekStart = new Date(todayStart);
      weekStart.setDate(weekStart.getDate() - 7);
      const monthStart = new Date(todayStart);
      monthStart.setDate(monthStart.getDate() - 30);
      return {
        yesterday: { start: yesterdayStart, end: todayStart, exclusiveEnd: true, divisor: 1 },
        week: { start: weekStart, end: now, exclusiveEnd: false, divisor: 7 },
        month: { start: monthStart, end: now, exclusiveEnd: false, divisor: 30 }
      };
    }

    function filterInPeriod(items, field, periodKey) {
      const range = getPeriodRanges()[periodKey];
      return items.filter(item => {
        const t = new Date(item[field]).getTime();
        if (range.exclusiveEnd) return t >= range.start.getTime() && t < range.end.getTime();
        return t >= range.start.getTime() && t <= range.end.getTime();
      });
    }

    function avgField(arr, field) {
      return arr.length ? Math.round(arr.reduce((s, x) => s + x[field], 0) / arr.length) : null;
    }

    function avgBP(items) {
      return {
        sys: avgField(items, 'systolic'),
        dia: avgField(items, 'diastolic'),
        pulse: avgField(items, 'pulse'),
        count: items.length
      };
    }

    function avgBowelStats(items, divisor) {
      if (!items.length) return { count: 0, perDay: null, avgType: null };
      const avgType = Math.round((items.reduce((s, b) => s + b.type, 0) / items.length) * 10) / 10;
      return {
        count: items.length,
        perDay: Math.round((items.length / divisor) * 10) / 10,
        avgType
      };
    }

    function fmtNum(n) {
      return n == null ? '—' : String(n);
    }

    function renderPeriodCell(value, sub) {
      const subHtml = sub ? `<span class="sub">${sub}</span>` : '';
      return `<td><span class="num">${value}</span>${subHtml}</td>`;
    }

    function renderBPPeriodTable(measurements) {
      const periods = ['yesterday', 'week', 'month'];
      const labels = { yesterday: 'Jučer', week: '7 dana', month: '30 dana' };
      const rows = [
        { label: 'Sistolni/gornji', field: 'sys' },
        { label: 'Dijastolni/donji', field: 'dia' },
        { label: 'Puls', field: 'pulse' }
      ];
      const stats = {};
      periods.forEach(p => { stats[p] = avgBP(filterInPeriod(measurements, 'measured_at', p)); });

      const body = rows.map(row => {
        const cells = periods.map(p => renderPeriodCell(fmtNum(stats[p][row.field]), stats[p].count ? `${stats[p].count} mj.` : null)).join('');
        return `<tr><td>${row.label}</td>${cells}</tr>`;
      }).join('');

      const header = periods.map(p => `<th>${labels[p]}</th>`).join('');
      return `<div class="stat-card"><h3>Pritisak — prosjeci</h3>
        <table class="period-table"><thead><tr><th></th>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderBPCategoryChart(measurements) {
      if (!measurements.length) return '';

      const categoryCounts = {};
      BP_CATEGORIES.forEach(c => { categoryCounts[c.key] = 0; });
      measurements.forEach(m => {
        const cls = classifyBP(m.systolic, m.diastolic);
        categoryCounts[cls.key] = (categoryCounts[cls.key] || 0) + 1;
      });
      const maxCount = Math.max(...Object.values(categoryCounts), 1);

      let bars = BP_CATEGORIES.map(cat => {
        const count = categoryCounts[cat.key] || 0;
        const pct = (count / maxCount) * 100;
        return `<div class="bar-row">
          <span class="bar-label">${cat.label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
          <span class="bar-count">${count}</span>
        </div>`;
      }).join('');

      return `<div class="stat-card">
        <h3>Rasponi pritiska (90 dana)</h3>
        <p class="chart-note" style="margin-top:0;margin-bottom:12px">Prilagođena skala (~10 mmHg niža od standardne). Format: sistolični / dijastolični (mmHg).</p>
        <div class="bar-chart">${bars}</div>
      </div>`;
    }

    function renderBowelPeriodTable(bowel) {
      const periods = ['yesterday', 'week', 'month'];
      const labels = { yesterday: 'Jučer', week: '7 dana', month: '30 dana' };
      const ranges = getPeriodRanges();
      const stats = {};
      periods.forEach(p => {
        stats[p] = avgBowelStats(filterInPeriod(bowel, 'recorded_at', p), ranges[p].divisor);
      });

      const rows = [
        {
          label: 'Broj unosa',
          render: p => renderPeriodCell(fmtNum(stats[p].count), p === 'yesterday' ? null : `${stats[p].perDay ?? '—'}/dan`)
        },
        {
          label: 'Prosj. tip (1–7)',
          render: p => renderPeriodCell(fmtNum(stats[p].avgType), stats[p].avgType != null ? getBowelType(Math.round(stats[p].avgType)).label.split(' ')[0] : null)
        }
      ];

      const body = rows.map(row => {
        const cells = periods.map(p => row.render(p)).join('');
        return `<tr><td>${row.label}</td>${cells}</tr>`;
      }).join('');

      const header = periods.map(p => `<th>${labels[p]}</th>`).join('');
      return `<div class="stat-card"><h3>Stolica — prosjeci</h3>
        <table class="period-table"><thead><tr><th></th>${header}</tr></thead><tbody>${body}</tbody></table>
        <p class="chart-note">Tip 4 = normalno. Niži prosjek nakon probiotika može značiti poboljšanje ako ste imali kašasto (6–7).</p></div>`;
    }

    function analyzeProbioticBowel(probiotics, bowel) {
      const emptyBucket = () => ({ doses: 0, types: [], counts: [] });
      const result = {};
      PROBIOTIC_TYPES.forEach(t => {
        result[t.key] = { label: t.label, morning: emptyBucket(), evening: emptyBucket(), all: emptyBucket() };
      });

      probiotics.forEach(entry => {
        const takenAt = new Date(entry.taken_at);
        const isMorning = takenAt.getHours() < 12;
        const windowEnd = new Date(takenAt.getTime() + 24 * 60 * 60 * 1000);
        const bowelAfter = bowel.filter(b => {
          const t = new Date(b.recorded_at);
          return t >= takenAt && t < windowEnd;
        });
        const avgType = bowelAfter.length
          ? bowelAfter.reduce((s, b) => s + b.type, 0) / bowelAfter.length
          : null;

        (Array.isArray(entry.types) ? entry.types : []).forEach(typeKey => {
          if (!result[typeKey]) return;
          const timeKey = isMorning ? 'morning' : 'evening';
          [result[typeKey].all, result[typeKey][timeKey]].forEach(bucket => {
            bucket.doses++;
            if (avgType != null) bucket.types.push(avgType);
            bucket.counts.push(bowelAfter.length);
          });
        });
      });

      const finalize = bucket => ({
        doses: bucket.doses,
        avgType: bucket.types.length
          ? Math.round((bucket.types.reduce((a, b) => a + b, 0) / bucket.types.length) * 10) / 10
          : null,
        avgCount: bucket.counts.length
          ? Math.round((bucket.counts.reduce((a, b) => a + b, 0) / bucket.counts.length) * 10) / 10
          : null
      });

      Object.keys(result).forEach(key => {
        const r = result[key];
        r.morning = finalize(r.morning);
        r.evening = finalize(r.evening);
        r.all = finalize(r.all);
      });
      return result;
    }

    function buildDailyTimeline(bowel, probiotics, days = 30) {
      const rows = [];
      const now = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const day = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        day.setDate(day.getDate() - i);
        const key = localDateKey(day);
        const dayBowel = bowel.filter(b => localDateKey(b.recorded_at) === key);
        const dayProbiotics = probiotics.filter(p => localDateKey(p.taken_at) === key);
        rows.push({
          label: `${day.getDate()}.${day.getMonth() + 1}.`,
          count: dayBowel.length,
          avgType: dayBowel.length
            ? Math.round((dayBowel.reduce((s, b) => s + b.type, 0) / dayBowel.length) * 10) / 10
            : null,
          probioticCount: dayProbiotics.length
        });
      }
      return rows;
    }
