    async function loadTrendovi() {
      const container = document.getElementById('trendovi-content');
      container.innerHTML = '<div class="spinner"></div>';
      showError(false);
      destroyTrendCharts();

      try {
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - 90);

        const [measurements, bowel, probiotics] = await Promise.all([
          fetchMeasurements(startDate, endDate),
          fetchBowel(startDate, endDate),
          fetchProbiotics(startDate, endDate)
        ]);

        const hasAnyData = measurements.length || bowel.length || probiotics.length;
        if (!hasAnyData) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M22 7l-8.5 8.5-4-4L2 17"/></svg></div>Nema dovoljno podataka za trendove.<br>Dodajte unose.</div>';
          return;
        }

        let html = '';
        html += renderBPPeriodTable(measurements);
        html += renderBowelPeriodTable(bowel);
        html += renderBPCategoryChart(measurements);

        const analysis = analyzeProbioticBowel(probiotics, bowel);
        const activeProbiotics = PROBIOTIC_TYPES.filter(t => analysis[t.key].all.doses > 0);

        if (activeProbiotics.length) {
          html += `<div class="stat-card">
            <h3>Probiotik → stolica (24h poslije)</h3>
            <p class="chart-note" style="margin-top:0;margin-bottom:12px">Uporedite jutarnje i večernje uzimanje. Manji Bristol tip i manje stolica mogu značiti da probiotik pomaže.</p>
            <div class="chart-wrap"><canvas id="chart-probiotic-type"></canvas></div>
            <div class="chart-wrap" style="margin-top:20px"><canvas id="chart-probiotic-count"></canvas></div>
          </div>`;

          html += `<div class="stat-card">
            <h3>Dnevni pregled (30 dana)</h3>
            <div class="chart-wrap tall"><canvas id="chart-daily-timeline"></canvas></div>
            <p class="chart-note">Zelene stubičke = broj stolica, roza linija = prosječni tip, narandžasta = probiotik unosi tog dana.</p>
          </div>`;

          html += `<div class="stat-card"><h3>Probiotik — detalji</h3><table class="period-table">
            <thead><tr><th>Probiotik</th><th>Uzimanja</th><th>Tip 24h (jutro)</th><th>Tip 24h (večer)</th><th>Stolica 24h</th></tr></thead><tbody>`;
          activeProbiotics.forEach(t => {
            const a = analysis[t.key];
            html += `<tr>
              <td>${t.label}</td>
              <td><span class="num">${a.all.doses}</span></td>
              <td>${fmtNum(a.morning.avgType)} <span class="sub">(${a.morning.doses}×)</span></td>
              <td>${fmtNum(a.evening.avgType)} <span class="sub">(${a.evening.doses}×)</span></td>
              <td>${fmtNum(a.all.avgCount)}/dan</td>
            </tr>`;
          });
          html += '</tbody></table></div>';
        } else if (probiotics.length === 0) {
          html += `<div class="stat-card"><h3>Probiotik analiza</h3>
            <p class="chart-note">Nema unosa probiotika. Dodajte probiotike da vidite uticaj na stolicu.</p></div>`;
        }

        container.innerHTML = html;

        if (activeProbiotics.length) {
          await loadChartJs();
          renderProbioticCharts(probiotics, bowel);
        }
      } catch (e) {
        console.error(e);
        container.innerHTML = '';
        showError(true, formatFetchError(e));
      }
    }

          const key = btn.dataset.key;
          if (selectedProbioticTypes.has(key)) selectedProbioticTypes.delete(key);
          else selectedProbioticTypes.add(key);
          renderProbioticGrid();
        });
      });
    }

    document.getElementById('form-measurement').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMeasurementErrors();
      let valid = true;

      const sys = parseInt(document.getElementById('m-systolic').value);
      const dia = parseInt(document.getElementById('m-diastolic').value);
      const pulse = parseInt(document.getElementById('m-pulse').value);
      const note = document.getElementById('m-note').value.trim();
      const dt = document.getElementById('m-datetime').value;

      if (isNaN(sys) || sys < 60 || sys > 250) {
        showFieldError('err-systolic', 'Unesite vrijednost između 60 i 250.');
        valid = false;
      }
      if (isNaN(dia) || dia < 40 || dia > 150) {
        showFieldError('err-diastolic', 'Unesite vrijednost između 40 i 150.');
        valid = false;
      }
      if (isNaN(pulse) || pulse < 30 || pulse > 200) {
        showFieldError('err-pulse', 'Unesite vrijednost između 30 i 200.');
        valid = false;
      }
      if (!dt) {
        showFieldError('err-datetime', 'Odaberite datum i vrijeme.');
        valid = false;
      }
      if (!valid) return;

      const { error } = await insertMeasurement({
        measured_at: new Date(dt).toISOString(),
        systolic: sys,
        diastolic: dia,
        pulse,
        note: note || null,
        pin_hash: currentPinHash
      });

      if (error) { alert('Greška pri spremanju.'); return; }
      closeModal('modal-measurement');
      if (currentView === 'danas') loadDanas();
      else switchView('danas');
    });

    document.getElementById('form-bowel').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedBowelType) {
        showFieldError('err-bowel-type', 'Odaberite tip stolice.');
        return;
      }
      showFieldError('err-bowel-type', null);

      const note = document.getElementById('b-note').value.trim();
      const dt = document.getElementById('b-datetime').value;

      const { error } = await insertBowel({
        recorded_at: new Date(dt).toISOString(),
        type: selectedBowelType,
        note: note || null,
        pin_hash: currentPinHash
      });

      if (error) { alert('Greška pri spremanju.'); return; }
      closeModal('modal-bowel');
      if (currentView === 'danas') loadDanas();
      else switchView('danas');
    });

    document.getElementById('form-probiotic').addEventListener('submit', async (e) => {
      e.preventDefault();
      showFieldError('err-probiotic-types', null);
      showFieldError('err-probiotic-datetime', null);

      if (selectedProbioticTypes.size === 0) {
        showFieldError('err-probiotic-types', 'Odaberite barem jedan probiotik.');
        return;
      }

      const note = document.getElementById('p-note').value.trim();
      const dt = document.getElementById('p-datetime').value;
      if (!dt) {
        showFieldError('err-probiotic-datetime', 'Odaberite datum i vrijeme.');
        return;
      }

      const { error } = await insertProbiotic({
        taken_at: new Date(dt).toISOString(),
        types: Array.from(selectedProbioticTypes),
        note: note || null,
        pin_hash: currentPinHash
      });

      if (error) { alert('Greška pri spremanju.'); return; }
      closeModal('modal-probiotic');
      if (currentView === 'danas') loadDanas();
      else switchView('danas');
    });

    // Settings
    document.getElementById('settings-btn').addEventListener('click', () => {
      openModal('modal-settings');
    });

    document.getElementById('close-settings').addEventListener('click', () => closeModal('modal-settings'));

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem(PIN_KEY);
      closeModal('modal-settings');
      currentPinHash = null;
      document.getElementById('main-app').classList.add('hidden');
      document.getElementById('pin-screen').classList.remove('hidden');
      document.getElementById('pin-input').value = '';
      showFieldError('err-pin', null);
    });

    // Init
    initPinScreen();
    renderBowelGrid();
    renderProbioticGrid();
    })();
  </script>
</body>
</html>
