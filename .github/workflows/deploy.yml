name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Add SUPABASE_URL and SUPABASE_ANON_KEY as repository secrets."
            exit 1
          fi
          VERSION="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          echo "{\"version\":\"${VERSION}\"}" > version.json
          sed -i "s|APP_VERSION_HERE|${VERSION}|g" index.html
          sed -i "s|SUPABASE_URL_HERE|${SUPABASE_URL}|g" index.html
          sed -i "s|SUPABASE_ANON_KEY_HERE|${SUPABASE_ANON_KEY}|g" index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
